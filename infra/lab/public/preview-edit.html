<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
<link rel="shortcut icon" href="/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>🎨 معاينة مباشرة + تعديل — منصة ثواني</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;background:#0a0a0a;color:#f5f5f5;min-height:100vh}
body{padding-bottom:80px}

/* Edit-mode banner ثابت أعلى الصفحة */
.edit-banner{
  position:sticky;top:0;z-index:100;
  background:linear-gradient(135deg,#16a34a 0%,#15803d 100%);
  padding:12px 16px;display:flex;align-items:center;justify-content:space-between;
  gap:14px;box-shadow:0 4px 18px rgba(22,163,74,.35);flex-wrap:wrap
}
.edit-banner-text{font-weight:800;font-size:14px;display:flex;align-items:center;gap:8px}
.edit-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn-banner{background:rgba(255,255,255,.22);color:#fff;border:1px solid rgba(255,255,255,.4);padding:6px 14px;border-radius:999px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-banner:hover{background:rgba(255,255,255,.32)}
.btn-banner.live{background:#fff;color:#15803d}

/* Header */
.hdr{padding:18px 16px;background:#0e0e0e;border-bottom:1px solid #1f1f1f;display:flex;align-items:center;gap:12px}
.hdr-logo{width:48px;height:48px;border-radius:50%;background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-size:22px;border:2px solid #d4af37}
.hdr-name{font-size:17px;font-weight:800;color:#f5f5f5}
.hdr-sub{font-size:11px;color:#9a9a9a;margin-top:2px}

/* Products grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;padding:18px 14px}
.card{background:#141414;border:1px solid #232323;border-radius:14px;overflow:hidden;transition:.2s}
.card.editing{border-color:#10b981;box-shadow:0 0 0 3px rgba(16,185,129,.18)}
.c-img{aspect-ratio:4/3;background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-size:48px;color:#3a3a3a;position:relative;overflow:hidden}
.c-img img{width:100%;height:100%;object-fit:cover}
.c-body{padding:14px}

/* Editable fields */
.editable{position:relative;border-radius:6px;padding:4px 6px;margin:-4px -6px;transition:.15s;cursor:pointer}
.editable:hover{background:rgba(16,185,129,.08);outline:1px dashed rgba(16,185,129,.4)}
.editable[contenteditable="true"]{background:rgba(16,185,129,.15);outline:2px solid #10b981;cursor:text}
.editable-hint{position:absolute;top:-22px;right:0;background:#10b981;color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;opacity:0;transition:.15s;pointer-events:none}
.editable:hover .editable-hint{opacity:1}

.c-name{font-size:16px;font-weight:800;color:#f5f5f5;margin-bottom:6px;line-height:1.3}
.c-desc{font-size:12.5px;color:#888;line-height:1.6;margin-bottom:10px;min-height:22px}
.c-price{font-size:18px;font-weight:800;color:#d4af37;display:inline-block}
.cur{font-size:13px;color:#888;font-weight:500;margin-right:3px}

.save-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#10b981;color:#fff;padding:10px 22px;border-radius:999px;font-weight:700;font-size:14px;box-shadow:0 8px 22px rgba(16,185,129,.4);opacity:0;transition:.25s;pointer-events:none;z-index:200}
.save-toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}

.empty{text-align:center;padding:48px 20px;color:#666;grid-column:1/-1}
.empty-emoji{font-size:64px;margin-bottom:14px;opacity:.5}
.empty-text{font-size:16px;font-weight:700;margin-bottom:8px;color:#888}
.empty-hint{font-size:13px;color:#666}

/* Mobile */
@media (max-width:540px){
  .edit-banner{flex-direction:column;align-items:stretch;text-align:center}
  .edit-actions{justify-content:center}
}
</style>
</head>
<body>

<div class="edit-banner">
  <div class="edit-banner-text">
    🎨 <span>وضع التعديل المباشر — انقر على أي نص لتعديله</span>
  </div>
  <div class="edit-actions">
    <button class="btn-banner" onclick="goBackToAdmin()">← رجوع للوحة</button>
    <button class="btn-banner live" id="livePreviewBtn" onclick="openLivePreview()">👁️ معاينة كما يراها العميل</button>
  </div>
</div>

<div class="hdr">
  <div class="hdr-logo" id="hdrLogo">🛍️</div>
  <div>
    <div class="hdr-name" id="hdrName">جاري التحميل...</div>
    <div class="hdr-sub" id="hdrSub">اضغط على اسم/سعر/وصف أي منتج للتعديل المباشر</div>
  </div>
</div>

<div id="productsGrid" class="grid">
  <div style="grid-column:1/-1;text-align:center;padding:40px;color:#666">⏳ جاري التحميل...</div>
</div>

<div id="saveToast" class="save-toast">✅ تم الحفظ</div>

<script>
const params  = new URLSearchParams(location.search);
const EDIT_TOKEN = params.get("edit") || "";
const STORE_ID = params.get("storeId") || "";
let TOKEN = localStorage.getItem("store_token") || "";

// لو وُجد edit-token قصير الأمد → بادله بـ session token كامل (one-time exchange)
async function exchangeEditTokenIfNeeded() {
  // legacy: لو URL يحوي ?token=... القديم، اقبله كـ fallback مرّة واحدة ثم احذفه من history
  const legacyToken = params.get("token");
  if (legacyToken) {
    TOKEN = legacyToken;
    localStorage.setItem("store_token", TOKEN);
    history.replaceState({}, "", location.pathname + "?storeId=" + encodeURIComponent(STORE_ID));
    return;
  }
  if (!EDIT_TOKEN) return;
  try {
    const r = await fetch("/store/exchange-edit-token", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ editToken: EDIT_TOKEN }),
    });
    const d = await r.json();
    if (r.ok && d.token) {
      TOKEN = d.token;
      localStorage.setItem("store_token", TOKEN);
      // نظّف الـ URL من الـ edit-token (لا يبقى في history)
      history.replaceState({}, "", location.pathname + "?storeId=" + encodeURIComponent(STORE_ID));
    }
  } catch {}
}

async function bootstrap() {
  await exchangeEditTokenIfNeeded();
  if (!TOKEN) {
    document.body.innerHTML = '<div style="padding:60px 20px;text-align:center;color:#fff"><div style="font-size:48px;margin-bottom:12px">🔒</div><div style="font-size:18px;font-weight:800;margin-bottom:8px">جلسة منتهية أو رابط غير صالح</div><div style="font-size:14px;color:#888">سجّل دخول من store-admin أولاً</div></div>';
    throw new Error("no token");
  }
  loadStore();
}

async function api(method, path, body) {
  const r = await fetch(path, {
    method,
    headers: { "x-store-token": TOKEN, "Content-Type": "application/json" },
    body: body ? JSON.stringify(body) : undefined,
  });
  const data = await r.json().catch(() => ({}));
  if (!r.ok) { const err = new Error(data.error || "خطأ"); err.status = r.status; throw err; }
  return data;
}

async function loadStore() {
  try {
    const { products, categories } = await api("GET", "/store/products");
    const { store } = await api("GET", "/store/profile");
    document.getElementById("hdrName").textContent = store.storeName || "متجرك";
    document.getElementById("hdrSub").textContent = `${products.length} منتج/خدمة · انقر على أي نص لتعديله مباشرة`;
    if (store.invoiceLogoUrl) {
      document.getElementById("hdrLogo").innerHTML = `<img src="${store.invoiceLogoUrl}" style="width:100%;height:100%;border-radius:50%;object-fit:cover">`;
    }
    renderProducts(products, store.currency || "ر.س");
  } catch (e) {
    document.getElementById("productsGrid").innerHTML = `<div class="empty"><div class="empty-emoji">⚠️</div><div class="empty-text">تعذّر التحميل</div><div class="empty-hint">${e.message}</div></div>`;
  }
}

function renderProducts(products, currency) {
  const grid = document.getElementById("productsGrid");
  if (!products.length) {
    grid.innerHTML = `<div class="empty"><div class="empty-emoji">📋</div><div class="empty-text">لا توجد منتجات/خدمات بعد</div><div class="empty-hint">أضف من store-admin أولاً ثم عُد هنا للمعاينة والتعديل</div></div>`;
    return;
  }
  grid.innerHTML = products.map(p => `
    <div class="card" data-pid="${esc(p.id)}">
      <div class="c-img">${p.imageUrl ? `<img src="${esc(p.imageUrl)}" loading="lazy">` : "🍽️"}</div>
      <div class="c-body">
        <div class="editable" data-field="name" data-pid="${esc(p.id)}">
          <div class="editable-hint">✏️ انقر للتعديل</div>
          <div class="c-name">${esc(p.name || "")}</div>
        </div>
        <div class="editable" data-field="description" data-pid="${esc(p.id)}">
          <div class="editable-hint">✏️ تعديل الوصف</div>
          <div class="c-desc">${esc(p.description || "أضف وصفاً قصيراً...")}</div>
        </div>
        <div class="editable" data-field="price" data-pid="${esc(p.id)}" style="display:inline-block">
          <div class="editable-hint">✏️ تعديل السعر</div>
          <div class="c-price">${p.price || 0}<span class="cur">${esc(currency)}</span></div>
        </div>
      </div>
    </div>
  `).join("");
  bindEditing();
}

function bindEditing() {
  document.querySelectorAll(".editable").forEach(el => {
    el.addEventListener("click", () => activateEdit(el));
  });
}

function activateEdit(el) {
  if (el.dataset.editing === "1") return;
  el.dataset.editing = "1";
  const card = el.closest(".card");
  card.classList.add("editing");
  const field = el.getAttribute("data-field");
  const pid   = el.getAttribute("data-pid");
  const contentEl = el.querySelector(".c-name, .c-desc, .c-price");
  if (!contentEl) return;

  // استخراج النص الأصلي
  const original = field === "price"
    ? parseFloat(contentEl.textContent.replace(/[^\d.]/g, "")) || 0
    : contentEl.textContent.trim();

  // اجعل العنصر editable
  if (field === "price") {
    contentEl.innerHTML = `<input type="number" step="0.5" min="0" value="${original}" style="background:transparent;border:none;color:#d4af37;font-size:18px;font-weight:800;width:100px;outline:none;font-family:inherit" autofocus>`;
  } else {
    contentEl.contentEditable = "true";
    contentEl.focus();
    // ضع المؤشر في النهاية
    const range = document.createRange();
    range.selectNodeContents(contentEl);
    range.collapse(false);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
  }

  const finish = async (commit) => {
    let newValue;
    if (field === "price") {
      const input = contentEl.querySelector("input");
      newValue = input ? parseFloat(input.value) : original;
      contentEl.innerHTML = `${newValue || 0}<span class="cur">ر.س</span>`;
    } else {
      contentEl.contentEditable = "false";
      newValue = contentEl.textContent.trim();
    }
    delete el.dataset.editing;
    card.classList.remove("editing");
    if (commit && newValue !== original && newValue !== "") {
      try {
        await api("PATCH", `/store/products/${pid}/inline`, { field, value: newValue });
        showToast("✅ تم الحفظ");
      } catch (e) {
        showToast("❌ فشل: " + e.message);
        // رجوع للقيمة الأصلية
        if (field === "price") {
          contentEl.innerHTML = `${original}<span class="cur">ر.س</span>`;
        } else {
          contentEl.textContent = original;
        }
      }
    }
  };

  contentEl.addEventListener("blur", () => finish(true), { once: true });
  contentEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && field !== "description") { e.preventDefault(); finish(true); }
    if (e.key === "Escape") { e.preventDefault(); finish(false); }
  });
}

function showToast(text) {
  const t = document.getElementById("saveToast");
  t.textContent = text;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2000);
}

function goBackToAdmin() {
  // محاولة إغلاق النافذة إذا فُتحت كـ tab جديد من store-admin
  try { window.close(); } catch(e) {}
  // إذا لم تُغلق (المتصفح يرفض إغلاق tabs لم تُفتح بـ JS)، توجّه يدوياً
  setTimeout(() => {
    window.location.href = "/store-admin.html";
  }, 80);
}

async function openLivePreview() {
  try {
    const r = await api("GET", "/store/preview-order-link");
    if (r.url) window.open(r.url, "_blank", "noopener");
  } catch (e) {
    alert(e.message || "تعذّر فتح المعاينة");
  }
}

function esc(s) {
  const d = document.createElement("div");
  d.textContent = String(s || "");
  return d.innerHTML;
}

bootstrap();
</script>
</body>
</html>

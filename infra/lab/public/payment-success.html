<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
<link rel="shortcut icon" href="/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تم الدفع بنجاح</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Tajawal',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1b5e20,#1a3c1a);padding:20px}
.card{background:#fff;border-radius:20px;padding:48px 36px;max-width:480px;width:100%;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,0.2)}
.icon{font-size:72px;margin-bottom:20px;animation:pop 0.5s ease}
@keyframes pop{0%{transform:scale(0)}80%{transform:scale(1.15)}100%{transform:scale(1)}}
h1{font-size:26px;font-weight:900;color:#1b5e20;margin-bottom:12px}
p{font-size:15px;color:#6b7280;line-height:1.7;margin-bottom:24px}
.btn{display:inline-block;padding:14px 32px;background:#1b5e20;color:#fff;border-radius:12px;text-decoration:none;font-size:16px;font-weight:700;transition:background 0.18s}
.btn:hover{background:#2e7d32}
.info{background:#f0fdf4;border-radius:12px;padding:16px;margin-bottom:24px;font-size:14px;color:#166534;line-height:1.8;text-align:right}
</style>
</head>
<body>
<div class="card">
  <div class="icon">🎉</div>
  <h1>تم تفعيل اشتراكك!</h1>
  <div class="info">
    ✅ تم استلام دفعتك بنجاح<br>
    📱 ستصلك رسالة تأكيد على واتساب<br>
    🤖 بوتك جاهز للعمل الآن
  </div>
  <p>يمكنك الآن الدخول للوحة التحكم وإعداد متجرك وإضافة منتجاتك.</p>
  <a href="/store-admin.html" class="btn">⚙️ انتقل للوحة التحكم</a>
</div>
</body>
</html>

version: "3.9"

services:

  # ── WhatsApp Bot ────────────────────────────────────────────────
  app:
    build: .
    container_name: whatsapp-bot
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - bot_sessions:/app/data/sessions    # Baileys sessions (critical)
      - bot_data:/app/data/invoices        # invoice images
      - bot_images:/app/data/images        # product images
      - bot_orders:/app/data              # orders.jsonl + stores.json
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ── Nginx Reverse Proxy ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: whatsapp-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro        # SSL certs (optional)
      - nginx_cache:/var/cache/nginx
    depends_on:
      app:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  bot_sessions:
  bot_data:
  bot_images:
  bot_orders:
  nginx_cache:

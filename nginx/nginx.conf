worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────
    log_format main '$remote_addr - $request_time "$request" $status $body_bytes_sent';
    access_log /var/log/nginx/access.log main buffer=16k;
    error_log  /var/log/nginx/error.log warn;

    # ── Performance ───────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    server_tokens off;

    # ── Compression ───────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        image/svg+xml;

    # ── Cache (static files) ──────────────────────────────────────
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=bot_cache:10m
                     max_size=500m inactive=60m use_temp_path=off;

    # ── Rate Limiting ─────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=general:10m rate=60r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ── Upstream ──────────────────────────────────────────────────
    upstream bot_app {
        server app:3000;
        keepalive 32;
    }

    # ── HTTP → redirect to HTTPS (if SSL configured) ──────────────
    server {
        listen 80;
        server_name _;

        # Health check direct (no redirect)
        location /health {
            proxy_pass http://bot_app;
        }

        # For Cloudflare Tunnel or plain HTTP — forward everything
        location / {
            proxy_pass http://bot_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;

            # Rate limit API routes
            limit_req zone=api burst=10 nodelay;
            limit_conn conn_limit 20;
        }

        # Static files — serve with cache
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            proxy_pass http://bot_app;
            proxy_cache bot_cache;
            proxy_cache_valid 200 7d;
            proxy_cache_use_stale error timeout updating;
            add_header X-Cache-Status $upstream_cache_status;
            expires 7d;
        }

        # Invoices/images — medium cache
        location ~* ^/(invoices|store-images)/ {
            proxy_pass http://bot_app;
            proxy_cache bot_cache;
            proxy_cache_valid 200 1d;
            expires 1d;
        }
    }

    # ── HTTPS (فعّل بعد إضافة شهادات SSL في nginx/ssl/) ──────────────
    # تشغيل: certbot certonly --webroot -w /var/www/html -d yourdomain.com
    # ثم نسخ:  cp /etc/letsencrypt/live/yourdomain.com/fullchain.pem ./nginx/ssl/
    #          cp /etc/letsencrypt/live/yourdomain.com/privkey.pem   ./nginx/ssl/
    server {
        listen 443 ssl http2;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # سياسات أمان حديثة (Mozilla Intermediate)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # OCSP stapling
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 1.1.1.1 8.8.8.8 valid=300s;
        resolver_timeout 5s;

        # Security headers (helmet يضيف بعضها لكن nginx layer مهم)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(self), microphone=(), camera=()" always;

        location /health {
            proxy_pass http://bot_app;
        }

        location / {
            proxy_pass http://bot_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;

            limit_req zone=api burst=10 nodelay;
            limit_conn conn_limit 20;
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            proxy_pass http://bot_app;
            proxy_cache bot_cache;
            proxy_cache_valid 200 7d;
            expires 7d;
        }

        location ~* ^/(invoices|store-images|store-videos)/ {
            proxy_pass http://bot_app;
            proxy_cache bot_cache;
            proxy_cache_valid 200 1d;
            expires 1d;
        }
    }

    # HTTP → 301 إلى HTTPS (يحلّ محل الـ server block العادي عند تفعيل SSL)
    # uncomment لو شغّلت HTTPS أعلاه:
    # server {
    #     listen 80;
    #     server_name _;
    #     return 301 https://$host$request_uri;
    # }
}
